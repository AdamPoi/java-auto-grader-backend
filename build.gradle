pitest {
    pitestVersion = '1.19.4'
    junit5PluginVersion = '1.2.3'

    targetClasses = [
            'io.adampoi.java_auto_grader.service.*'
    ]

    targetTests = [
            'io.adampoi.java_auto_grader.*Test'
    ]

    excludedTestClasses = [
            'io.adampoi.java_auto_grader.mutation.AssignmentMutationBenchmarkTest'
    ]

    threads = 4
    outputFormats = ['HTML', 'XML']
    timestampedReports = false
}


// PIT is slow, so run the benchmark explicitly instead of during every unit-test run.
// Merge excludeTags into the existing tasks.named('test') block.
tasks.named('test') {
    useJUnitPlatform {
        excludeTags 'mutation', 'tryout-mutation'
    }
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test // tests are required to run before generating the report
}

// PIT is slow, so run the benchmark explicitly instead of during every unit-test run.
tasks.register('tryoutMutationBenchmark', Test) {
    group = 'verification'
    description = 'Grades source-level mutants through the real tryout service path.'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'tryout-mutation'
    }
    minHeapSize = '128m'
    maxHeapSize = '1g'
    maxParallelForks = 1
    jvmArgs '-Xshare:off'
    shouldRunAfter tasks.named('test')
}

def rawTryoutMutationDetails = layout.buildDirectory.file(
        'reports/tryout-mutation/tryout-mutation-details.csv'
)
def validTryoutMutationReportDirectory = layout.buildDirectory.dir(
        'reports/tryout-mutation-valid'
)

tasks.register('validMutationReport', JavaExec) {
    group = 'verification'
    description = 'Reclassifies non-compiling mutants and writes a journal-valid mutation score.'
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'io.adampoi.java_auto_grader.mutation.report.ValidMutationReportCli'
    args rawTryoutMutationDetails.get().asFile.absolutePath,
            validTryoutMutationReportDirectory.get().asFile.absolutePath
    onlyIf {
        rawTryoutMutationDetails.get().asFile.exists()
    }
}

tasks.named('tryoutMutationBenchmark') {
    finalizedBy tasks.named('validMutationReport')
}

// PIT is slow, so run the benchmark explicitly instead of during every unit-test run.
tasks.register('mutationBenchmark', Test) {
    group = 'verification'
    description = 'Runs PIT against seeded assignment solutionCode and rubric testCode.'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'mutation'
    }
    minHeapSize = '128m'
    maxHeapSize = '1g'
    maxParallelForks = 1
    jvmArgs '-Xshare:off'
    shouldRunAfter tasks.named('test')
}


// Replace the existing testlogger block with assignment syntax.
testlogger {
    theme = 'mocha'
    showExceptions = true
    showStackTraces = true
    showFullStackTraces = false
    showCauses = true
    slowThreshold = 2000
    showSummary = true
    showSimpleNames = false
    showPassed = true
    showSkipped = true
    showFailed = true
    showOnlySlow = false
    showStandardStreams = false
    showPassedStandardStreams = true
    showSkippedStandardStreams = true
    showFailedStandardStreams = true
    logLevel = 'lifecycle'
}

// Temporarily enable this to show the exact deprecated Java API and line.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['-Xlint:deprecation']
}
