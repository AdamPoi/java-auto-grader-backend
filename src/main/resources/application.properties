spring.config.import=optional:file:env.properties
spring.application.name=java-auto-grader
server.port=${APP_PORT:8080}
spring.profiles.active=${APP_ENV:dev}
# Logging settings
logging.level.root=INFO
logging.level.io.adampoi=DEBUG
# PostgreSQL database connection properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
# Flyway settings
spring.flyway.enabled=true
spring.flyway.url=${DB_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.group=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
#spring.flyway.sql-migration-prefix=""
# JWT settings
security.jwt.secret-key=${JWT_SECRET_KEY}
# in milliseconds
security.jwt.expiration-time=${JWT_EXPIRATION_TIME:3600000}
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# error handling
error.handling.http-status-in-json-response=true
error.handling.exception-logging=NO_LOGGING
error.handling.full-stacktrace-http-statuses=5xx
error.handling.log-levels.5xx=ERROR
logging.file.path=./logs
#logging.file.name=./logs/java-auto-grader.log
#logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
#docker
spring.docker.compose.lifecycle-management=start-only
springdoc.pathsToMatch=/api/**
#spring.devtools.restart.poll-interval=2s
#spring.devtools.restart.quiet-period=1s
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
#logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
# actuator settings
management.endpoints.web.exposure.include=metrics, health, info, loggers, beans, mappings, prometheus
management.health.diskspace.enabled=false
management.health.defaults.enabled=false
management.endpoint.health.show-details=always
management.endpoint.health.show-components=never
management.metrics.tags.application=${spring.application.name}
#management.metrics.distribution.percentiles-histogram.http.server.requests=true
#management.metrics.distribution.percentiles-histogram.jvm.memory.used=true
#management.metrics.distribution.percentiles-histogram.jvm.gc.pause=true
#management.metrics.distribution.percentiles-histogram.process.cpu.usage=true
#management.metrics.distribution.percentiles-histogram.system.cpu.usage=true
#management.metrics.distribution.percentiles-histogram.system.load.average.1m=true
#management.metrics.distribution.percentiles-histogram.system.load.average.5m=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.chat.options.model=llama3.2:3b
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
# Provider-aware model selection for the production code-feedback endpoint.
code-feedback.default-model=${CODE_FEEDBACK_DEFAULT_MODEL:ollama:llama3.2:3b}
code-feedback.allowed-models=${CODE_FEEDBACK_ALLOWED_MODELS:}
code-feedback.temperature=${CODE_FEEDBACK_TEMPERATURE:0.3}
code-feedback.top-p=${CODE_FEEDBACK_TOP_P:0.2}
code-feedback.seed=${CODE_FEEDBACK_SEED:42}
# RQ3 is opt-in so normal application startup and unit tests never require local models.
evaluation.rq3.enabled=${RQ3_ENABLED:false}
evaluation.rq3.dataset=${RQ3_DATASET:evaluation/rq3/cases.sample.json}
evaluation.rq3.output-directory=${RQ3_OUTPUT_DIRECTORY:build/reports/rq3}
evaluation.rq3.models=${RQ3_MODELS:ollama:llama3.2:3b}
evaluation.rq3.repetitions=${RQ3_REPETITIONS:3}
evaluation.rq3.temperature=${RQ3_TEMPERATURE:0.3}
evaluation.rq3.top-p=${RQ3_TOP_P:0.2}
evaluation.rq3.seed=${RQ3_SEED:42}
evaluation.rq3.similarity-threshold=${RQ3_SIMILARITY_THRESHOLD:0.75}
evaluation.rq3.prompt-version=${RQ3_PROMPT_VERSION:rq3-structured-v2}
evaluation.rq3.backend-commit=${RQ3_BACKEND_COMMIT:UNSPECIFIED}
evaluation.rq3.providers.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
evaluation.rq3.providers.openai.api-key=${OPENAI_API_KEY:}
evaluation.rq3.providers.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
evaluation.rq3.providers.openrouter.api-key=${OPENROUTER_API_KEY:}
evaluation.rq3.providers.openrouter.site-url=${OPENROUTER_SITE_URL:}
evaluation.rq3.providers.openrouter.app-name=${OPENROUTER_APP_NAME:Java Auto Grader RQ3}
evaluation.rq3.providers.opencode.base-url=${OPENCODE_BASE_URL:https://opencode.ai/zen/v1}
evaluation.rq3.providers.opencode.api-key=${OPENCODE_API_KEY:}
# Ehcache Configuration
#spring.cache.type=JCACHE
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.type=none
